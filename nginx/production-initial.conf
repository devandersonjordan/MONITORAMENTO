# Configuracao inicial SEM SSL — usada apenas para obter o certificado
# Depois de rodar o certbot, trocar por production.conf
server {
    listen 80;
    server_name agilizesolar.online www.agilizesolar.online;

    client_max_body_size 50M;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API backend (Laravel)
    location /api {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }
    }

    # Health check
    location /up {
        root /var/www/public;
        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            include fastcgi_params;
        }
    }

    # Storage files
    location /storage {
        alias /var/www/storage/app/public;
    }

    # Frontend (React SPA)
    location / {
        root /var/www/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
