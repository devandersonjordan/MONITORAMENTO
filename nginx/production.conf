# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name agilizesolar.online www.agilizesolar.online;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://agilizesolar.online$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name agilizesolar.online www.agilizesolar.online;

    ssl_certificate /etc/letsencrypt/live/agilizesolar.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agilizesolar.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API backend (Laravel)
    location /api {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }
    }

    # Swagger docs
    location /docs {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            include fastcgi_params;
        }
    }

    # Health check
    location /up {
        root /var/www/public;
        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
            include fastcgi_params;
        }
    }

    # Storage files
    location /storage {
        alias /var/www/storage/app/public;
    }

    # Frontend (React SPA)
    location / {
        root /var/www/frontend/dist;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Initial HTTP-only config (used before SSL cert exists)
# Rename this file to production-initial.conf for first deploy,
# then switch to the full config after certbot runs.
