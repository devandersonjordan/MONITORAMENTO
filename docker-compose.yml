services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solar-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/storage/app/invoices:/var/www/storage/app/invoices
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=solar_saas
      - DB_USERNAME=solar
      - DB_PASSWORD=solar_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solar-network

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solar-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=solar_saas
      - DB_USERNAME=solar
      - DB_PASSWORD=solar_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      - app
    networks:
      - solar-network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solar-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=solar_saas
      - DB_USERNAME=solar
      - DB_PASSWORD=solar_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      - app
    networks:
      - solar-network

  nginx:
    image: nginx:1.27-alpine
    container_name: solar-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - solar-network

  frontend:
    image: node:22-alpine
    container_name: solar-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - solar-network

  postgres:
    image: postgres:16-alpine
    container_name: solar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: solar_saas
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solar_saas"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - solar-network

  redis:
    image: redis:7-alpine
    container_name: solar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - solar-network

  mailpit:
    image: axllent/mailpit
    container_name: solar-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - solar-network

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:

networks:
  solar-network:
    driver: bridge
