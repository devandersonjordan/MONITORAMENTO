services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solar-app
    restart: always
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - app_storage:/var/www/storage/app
    env_file:
      - ./backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solar-network

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solar-queue
    restart: always
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www
      - app_storage:/var/www/storage/app
    env_file:
      - ./backend/.env.production
    depends_on:
      - app
    networks:
      - solar-network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solar-scheduler
    restart: always
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www
      - app_storage:/var/www/storage/app
    env_file:
      - ./backend/.env.production
    depends_on:
      - app
    networks:
      - solar-network

  nginx:
    image: nginx:1.27-alpine
    container_name: solar-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www
      - ./frontend/dist:/var/www/frontend/dist:ro
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - solar-network

  certbot:
    image: certbot/certbot
    container_name: solar-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  postgres:
    image: postgres:16-alpine
    container_name: solar-postgres
    restart: always
    environment:
      POSTGRES_DB: solar_saas
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solar_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solar_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solar-network

  redis:
    image: redis:7-alpine
    container_name: solar-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solar-network

volumes:
  postgres_data:
  redis_data:
  app_storage:

networks:
  solar-network:
    driver: bridge
